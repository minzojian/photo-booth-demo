name: Build Kiosk Client

# =============================================================================
# 构建 Electron 桌面端（macOS ARM64 + Windows x64）并发布 GitHub Release
# Build Electron kiosk client for macOS ARM64 & Windows x64 → GitHub Release
# =============================================================================

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'

jobs:
  # ── macOS ARM64 (Apple Silicon) ──────────────────────────────────────────
  build-mac:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        working-directory: apps/kiosk-client
        run: pnpm rebuild:native

      - name: Build & Package (macOS ARM64)
        working-directory: apps/kiosk-client
        run: |
          pnpm run build
          ELECTRON_VER=$(node -p "require('electron/package.json').version")
          npx electron-builder --mac --arm64 --publish never -c.electronVersion="$ELECTRON_VER" && node scripts/rename-with-hash.cjs --version=$(node -p "require('./package.json').version")

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-macos-arm64
          path: |
            apps/kiosk-client/release/*.zip
            apps/kiosk-client/release/*.blockmap
            apps/kiosk-client/release/*.yml
          if-no-files-found: error

  # ── Windows x64 ─────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        working-directory: apps/kiosk-client
        run: pnpm rebuild:native

      - name: Build & Package (Windows x64)
        working-directory: apps/kiosk-client
        run: |
          pnpm run build
          $electronVer = node -p "require('electron/package.json').version"
          npx electron-builder --win --x64 --publish never "-c.electronVersion=$electronVer"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node scripts/rename-with-hash.cjs --version=$(node -p "require('./package.json').version")
          Write-Host "=== Release directory contents ==="
          Get-ChildItem release -Name

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-windows-x64
          path: |
            apps/kiosk-client/release/*.zip
            apps/kiosk-client/release/*.blockmap
            apps/kiosk-client/release/*.yml
          if-no-files-found: error

  # ── GitHub Release ──────────────────────────────────────────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/kiosk-client/package.json').version")
          TAG="${{ github.ref_name }}"
          if [ "v$VERSION" != "$TAG" ]; then
            echo "❌ tag ($TAG) 与 package.json 版本 ($VERSION) 不一致"
            exit 1
          fi
          echo "value=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: kiosk-macos-arm64
          path: release/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: kiosk-windows-x64
          path: release/windows

      - name: Delete existing release (if any)
        run: gh release delete ${{ steps.version.outputs.value }} --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: ${{ steps.version.outputs.value }}
          draft: false
          prerelease: false
          files: |
            release/macos/*.zip
            release/macos/*.blockmap
            release/macos/*.yml
            release/windows/*.zip
            release/windows/*.blockmap
            release/windows/*.yml
          fail_on_unmatched_files: false
