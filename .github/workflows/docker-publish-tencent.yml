name: Docker Publish — Tencent Cloud CCR

# =============================================================================
# 构建并推送 cloud-server Docker 镜像到腾讯云 CCR
# Build & push cloud-server Docker image to Tencent Cloud CCR
# =============================================================================

on:
  push:
    branches: [main]
    paths:
      - 'apps/cloud-server/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docker-publish-tencent.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: git short SHA)'
        required: false
        default: ''

env:
  REGISTRY: ccr.ccs.tencentyun.com
  NAMESPACE: photo-booth
  IMAGE_NAME: photo-booth-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_SHA::8}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Tencent Cloud CCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.TENCENT_CCR_USER }}
          password: ${{ secrets.TENCENT_CCR_PASS }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/cloud-server/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.meta.outputs.full_image }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Published ${{ steps.meta.outputs.full_image }}"
