# ============================================================
# Photo Booth — Nginx API 反向代理（include 片段）
# 用途：将 /photo_booth/api/* 代理到 cloud-server (Fastify :4000)
# 用法：include 到任意 server {} 块中
#   独立部署：include 到 lunastudio.cn 的 server 块
#   合并部署：include 到 indie.lunastudio.cn 的 server 块
#   最终访问：https://<domain>/photo_booth/api/health 等
# ============================================================

# --------------------- API 反向代理 ---------------------
location /photo_booth/api/ {
    rewrite ^/photo_booth/api/(.*) /$1 break;
    proxy_pass http://172.16.1.168:4000;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 30s;
    proxy_read_timeout 60s;
    proxy_send_timeout 30s;
}

# --------------------- WebSocket (Socket.IO) ---------------------
location /photo_booth/socket.io/ {
    rewrite ^/photo_booth/(.*) /$1 break;
    proxy_pass http://172.16.1.168:4000;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_connect_timeout 30s;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}
